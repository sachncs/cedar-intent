name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.22
      - name: Run ruff check
        run: ruff check .

  typecheck:
    name: Type-check with mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install mypy
        run: pip install mypy==1.13.0
      - name: Install package
        run: pip install -e ".[test]"
      - name: Run mypy strict
        run: mypy

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: pip install -e ".[test]"
      - name: Run pytest with coverage
        run: |
          pytest --cov=cedar_intent --cov-report=term --cov-fail-under=90

  docs:
    name: Verify documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required documentation files
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f LICENSE
          test -f NOTICE
      - name: Verify docs directory has required guides
        run: |
          test -f docs/architecture.md
          test -f docs/cli.md
          test -f docs/python-api.md
          test -f docs/deployment.md
          test -f docs/verification.md
